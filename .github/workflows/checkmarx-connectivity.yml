name: Checkmarx CxSAST Connectivity Diagnostic

on:
  workflow_dispatch:

jobs:
  cx-diagnostics:
    name: Diagnose Checkmarx connectivity
    runs-on: ubuntu-latest

    env:
      CX_BASE_URL: ${{ secrets.CX_BASE_URL }}
      CX_USERNAME: ${{ secrets.CX_USERNAME }}
      CX_PASSWORD: ${{ secrets.CX_PASSWORD }}

      # Opcional. Si no lo defines, el script usa el default conocido.
      CX_CLIENT_ID: ${{ secrets.CX_CLIENT_ID }}
      CX_CLIENT_SECRET: ${{ secrets.CX_CLIENT_SECRET }}

      # Para diagnóstico inicial:
      # false = ignora validación TLS dentro de requests.
      # true = valida con trust store del runner.
      # /ruta/al/cert.pem = valida con CA corporativa.
      CX_VERIFY_TLS: "false"

      CX_TIMEOUT_SECONDS: "20"

      # Si TI te da proxy, puedes probarlo así:
      # HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
      # HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
      # NO_PROXY: "localhost,127.0.0.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mask sensitive values
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.CX_USERNAME }}"
          echo "::add-mask::${{ secrets.CX_PASSWORD }}"
          echo "::add-mask::${{ secrets.CX_CLIENT_SECRET }}"

      - name: Show runner network baseline
        shell: bash
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub Actions: $GITHUB_ACTIONS"
          echo "Public IP:"
          curl -s https://api.ipify.org || true
          echo ""
          echo "DNS lookup:"
          nslookup "$(python - <<'PY'
          import os, urllib.parse
          print(urllib.parse.urlparse(os.environ["CX_BASE_URL"]).hostname)
          PY
          )" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Checkmarx diagnostic
        shell: bash
        run: |
          mkdir -p diagnostics
          python scripts/cx_diagnostics.py 2>&1 | tee diagnostics/cx-diagnostics.log

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cx-diagnostics-log
          path: diagnostics/cx-diagnostics.log